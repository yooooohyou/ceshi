<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>实时日志查看</title>
<style>
  :root {
    --bg: #1e1e1e;
    --panel: #252526;
    --border: #3c3c3c;
    --text: #d4d4d4;
    --muted: #858585;
    --info: #d4d4d4;
    --debug: #8a8a8a;
    --warn: #d48806;
    --error: #f85149;
    --error-bg: #3a1d1d;
    --accent: #4ec9b0;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Menlo", "Consolas", "Microsoft YaHei", monospace;
    font-size: 13px;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  header .title {
    font-weight: bold;
    color: var(--accent);
    margin-right: 12px;
  }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--muted);
    box-shadow: 0 0 4px rgba(255,255,255,0.2);
  }
  .dot.connecting { background: var(--yellow); }
  .dot.open { background: var(--green); }
  .dot.error { background: var(--red); }
  select, input[type="text"], button {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    font-family: inherit;
    font-size: 12px;
  }
  button { cursor: pointer; }
  button:hover { background: #2d2d2d; }
  button.active { background: var(--accent); color: #1e1e1e; border-color: var(--accent); }
  input[type="text"] { width: 200px; }
  main {
    flex: 1;
    overflow: auto;
    padding: 6px 12px;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.5;
  }
  .line { padding: 1px 0; }
  .line.hidden { display: none; }
  .line.INFO { color: var(--info); }
  .line.DEBUG { color: var(--debug); }
  .line.WARNING { color: var(--warn); }
  .line.ERROR { color: var(--error); background: var(--error-bg); }
  .divider {
    color: var(--muted);
    text-align: center;
    margin: 8px 0;
    border-top: 1px dashed var(--border);
    padding-top: 6px;
    font-style: italic;
  }
  footer {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 4px 12px;
    color: var(--muted);
    font-size: 11px;
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
<header>
  <span class="title">📜 实时日志</span>
  <span class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">未连接</span>
  </span>
  <select id="levelFilter" title="按日志级别筛选">
    <option value="">全部级别</option>
    <option value="DEBUG">DEBUG</option>
    <option value="INFO">INFO</option>
    <option value="WARNING">WARNING</option>
    <option value="ERROR">ERROR</option>
  </select>
  <input type="text" id="keywordFilter" placeholder="关键词筛选..." />
  <button id="pauseBtn">暂停</button>
  <button id="clearBtn">清屏</button>
  <button id="bottomBtn">回到底部</button>
</header>
<main id="log"></main>
<footer>
  <span id="counter">已显示 0 行 / 上限 5000</span>
  <span id="bufInfo"></span>
</footer>

<script>
(function () {
  const MAX_LINES = 5000;
  const MAX_BUFFER = 1000;
  const LEVEL_RE = / - (DEBUG|INFO|WARNING|ERROR|CRITICAL) - /;

  const logEl = document.getElementById("log");
  const statusDot = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");
  const levelFilter = document.getElementById("levelFilter");
  const keywordFilter = document.getElementById("keywordFilter");
  const pauseBtn = document.getElementById("pauseBtn");
  const clearBtn = document.getElementById("clearBtn");
  const bottomBtn = document.getElementById("bottomBtn");
  const counter = document.getElementById("counter");
  const bufInfo = document.getElementById("bufInfo");

  let paused = false;
  let buffer = [];          // 暂停时缓存的新行
  let autoScroll = true;    // 自动滚动开关（用户向上滚动则关闭）

  function setStatus(state, text) {
    statusDot.className = "dot " + state;
    statusText.textContent = text;
  }

  function parseLevel(line) {
    const m = line.match(LEVEL_RE);
    return m ? m[1] : "";
  }

  function matchFilter(line, level) {
    const wantLevel = levelFilter.value;
    if (wantLevel && level !== wantLevel) return false;
    const kw = keywordFilter.value.trim();
    if (kw && !line.includes(kw)) return false;
    return true;
  }

  function appendLine(line) {
    const div = document.createElement("div");
    const level = parseLevel(line);
    div.className = "line " + (level || "INFO");
    div.dataset.level = level;
    div.textContent = line;
    if (!matchFilter(line, level)) div.classList.add("hidden");
    logEl.appendChild(div);

    // 行数封顶
    while (logEl.childNodes.length > MAX_LINES) {
      logEl.removeChild(logEl.firstChild);
    }
    updateCounter();
    if (autoScroll) scrollToBottom();
  }

  function appendDivider(text) {
    const div = document.createElement("div");
    div.className = "divider";
    div.textContent = text;
    logEl.appendChild(div);
    if (autoScroll) scrollToBottom();
  }

  function scrollToBottom() {
    logEl.scrollTop = logEl.scrollHeight;
  }

  function updateCounter() {
    const total = logEl.querySelectorAll(".line").length;
    counter.textContent = `已显示 ${total} 行 / 上限 ${MAX_LINES}`;
  }

  function updateBufInfo() {
    if (paused && buffer.length > 0) {
      bufInfo.textContent = `已暂停（缓冲 ${buffer.length} 行）`;
    } else if (paused) {
      bufInfo.textContent = "已暂停";
    } else {
      bufInfo.textContent = "";
    }
  }

  function applyFilters() {
    const lines = logEl.querySelectorAll(".line");
    lines.forEach(el => {
      if (matchFilter(el.textContent, el.dataset.level)) {
        el.classList.remove("hidden");
      } else {
        el.classList.add("hidden");
      }
    });
  }

  // 用户向上滚动时关闭 autoScroll；滚到底部恢复
  logEl.addEventListener("scroll", () => {
    const atBottom = logEl.scrollTop + logEl.clientHeight >= logEl.scrollHeight - 20;
    autoScroll = atBottom;
  });

  levelFilter.addEventListener("change", applyFilters);
  keywordFilter.addEventListener("input", applyFilters);

  pauseBtn.addEventListener("click", () => {
    paused = !paused;
    pauseBtn.textContent = paused ? "继续" : "暂停";
    pauseBtn.classList.toggle("active", paused);
    if (!paused && buffer.length > 0) {
      buffer.forEach(appendLine);
      buffer = [];
    }
    updateBufInfo();
  });

  clearBtn.addEventListener("click", () => {
    logEl.innerHTML = "";
    updateCounter();
  });

  bottomBtn.addEventListener("click", () => {
    autoScroll = true;
    scrollToBottom();
  });

  function handleLine(line) {
    if (paused) {
      buffer.push(line);
      if (buffer.length > MAX_BUFFER) buffer.shift();
      updateBufInfo();
    } else {
      appendLine(line);
    }
  }

  function connect() {
    setStatus("connecting", "连接中...");
    const es = new EventSource("/api/logs/stream?tail=200");

    es.onopen = () => setStatus("open", "已连接");

    es.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data && typeof data.line === "string") handleLine(data.line);
      } catch (err) { /* ignore */ }
    };

    es.addEventListener("ready", () => {
      appendDivider("—— 以下为实时日志 ——");
    });

    es.onerror = () => {
      setStatus("error", "连接断开，自动重连中...");
    };
  }

  connect();
})();
</script>
</body>
</html>
